<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VA Referendum</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:#f3f4f6;color:#111;-webkit-font-smoothing:antialiased}
:root{--d:#2563eb;--dd:#1e40af;--r:#dc2626;--rd:#991b1b;--p:#8b5cf6;--m:ui-monospace,SFMono-Regular,Menlo,monospace}
.page{height:100vh;display:grid;grid-template-rows:18px 20px 1fr 18px;padding:4px 6px;gap:3px}
.hdr{text-align:center;font-weight:800;font-size:11px;line-height:18px}
.hdr span{font-weight:500;font-size:8px;color:#6b7280;margin-left:4px}
.pills{display:flex;gap:2px;justify-content:center}
.pill{background:#fff;border-radius:3px;padding:1px 5px;display:inline-flex;align-items:baseline;gap:3px;font-size:7px;line-height:16px}
.pill b{font-weight:800;font-size:10px;font-family:var(--m);letter-spacing:-.02em}
.pill small{color:#9ca3af;font-size:6px}
.main{display:grid;grid-template-columns:1fr 2.2fr;gap:3px;min-height:0;overflow:hidden}
.pnl{background:#fff;border-radius:5px;display:flex;flex-direction:column;overflow:hidden}
.pnl-h{padding:2px 6px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;font-weight:700;font-size:8px}
.tog{display:inline-flex;background:#f3f4f6;border-radius:99px;padding:1px}
.tog button{border:none;background:none;padding:1px 5px;font-family:inherit;font-weight:600;font-size:6px;color:#aaa;border-radius:99px;cursor:pointer}
.tog button.on{background:#fff;color:var(--dd)}
#cw{flex:1;min-height:0;padding:2px 4px}
.cl{display:flex;gap:5px;justify-content:center;flex-shrink:0;padding:1px;font-size:6px;font-weight:600;color:#888}
.cl i{display:inline-block;width:8px;height:2px;border-radius:1px;vertical-align:middle;margin-right:1px}
#mw{flex:1;position:relative;min-height:0}
#ms{position:absolute;inset:0;width:100%;height:100%}
.leg{position:absolute;bottom:2px;left:2px;background:rgba(255,255,255,.9);border-radius:3px;padding:2px 4px;font-size:5px}
.leg canvas{display:block;width:60px;height:4px;border-radius:2px;margin:1px 0}
.leg .row{display:flex;justify-content:space-between;width:60px;font-weight:600;font-family:var(--m);color:#aaa}
.leg .row .d{color:var(--dd)}.leg .row .r{color:var(--rd)}
.leg .lt{font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#aaa;margin-bottom:1px}
.tip{position:fixed;pointer-events:none;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-radius:5px;padding:5px 7px;box-shadow:0 2px 10px rgba(0,0,0,.12);z-index:999;display:none;font-size:8px;line-height:1.3;min-width:130px}
.tip b{font-size:9px;display:block}
.tip em{font-style:normal;font-size:6px;text-transform:uppercase;letter-spacing:.04em;color:#999;display:block;margin-bottom:3px}
.tip .r{display:flex;justify-content:space-between;padding:.5px 0}
.tip .l{color:#555;font-weight:600}
.tip .v{font-weight:700;font-family:var(--m)}
.tip .v.dem{color:var(--d)}.tip .v.gop{color:var(--r)}
.tip .sec{font-size:6px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#aaa;margin:2px 0 1px}
.bot{display:flex;gap:6px;justify-content:center;font-size:7px;line-height:16px}
.bot span{color:#888}
.bot b{font-weight:800;font-family:var(--m)}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">Virginia 2026 Redistricting Referendum<span>EV Projection · 2025 Gov Applied</span></div>
  <div class="pills" id="pills"></div>
  <div class="main">
    <div class="pnl">
      <div class="pnl-h">EV Timeline</div>
      <div class="cl"><i style="background:#aaa"></i>2025 <i style="background:var(--d)"></i>2026 <i style="background:var(--p);opacity:.5"></i>Proj</div>
      <div id="cw"></div>
    </div>
    <div class="pnl">
      <div class="pnl-h"><span>Precinct Map</span>
        <div class="tog"><button class="on" data-v="margin">2025</button><button data-v="ev">EV%</button><button data-v="diff">vs2025</button></div>
      </div>
      <div id="mw"><svg id="ms"></svg>
        <div class="leg" id="leg"><div class="lt" id="legT">2025 Margin</div><canvas id="legC" width="60" height="4"></canvas><div class="row"><span class="d" id="lL">D+60</span><span id="lM">0</span><span class="r" id="lR">R+60</span></div></div>
      </div>
    </div>
  </div>
  <div class="bot" id="bot"></div>
</div>
<div class="tip" id="tip"></div>
<script>
const B='.';
const MC=d3.scaleLinear().domain([-60,-20,-5,0,5,20,60]).range(['#991b1b','#dc2626','#f87171','#fde047','#60a5fa','#2563eb','#1e40af']).clamp(true);
const EC=d3.scaleSequential(d3.interpolateYlOrRd).domain([3,20]);
const DC=d3.scaleLinear().domain([8,12,16.5,21,32]).range(['#ef4444','#fca5a5','#f5f5f5','#93c5fd','#3b82f6']).clamp(true);
let cv='margin',pp,LL={};

// Fix GeoJSON winding: exterior CCW, holes CW (for D3 compliance)
function rewind(fc){
  fc.features.forEach(f=>{
    const g=f.geometry;
    if(g.type==='Polygon') rwPoly(g.coordinates);
    else if(g.type==='MultiPolygon') g.coordinates.forEach(p=>rwPoly(p));
  });
  return fc;
}
function rwPoly(rings){
  rings.forEach((ring,i)=>{
    const a=ringArea(ring);
    // exterior (i=0) must be CCW (area>0 in geo coords), holes CW (area<0)
    if(i===0&&a<0) ring.reverse();
    else if(i>0&&a>0) ring.reverse();
  });
}
function ringArea(ring){
  let a=0;for(let i=0;i<ring.length-1;i++) a+=(ring[i+1][0]-ring[i][0])*(ring[i+1][1]+ring[i][1]);return a;
}

async function load(){
  const[t,e,l]=await Promise.all([
    fetch(B+'/va_precincts_2025.json').then(r=>r.json()),
    fetch(B+'/va_ev_2026_locality.json').then(r=>r.json()),
    fetch(B+'/va_ev_cumulative_timeline.json').then(r=>r.json())
  ]);return{t,e,l};
}
function bLL(t,e){
  const a={};t.objects.precincts.geometries.forEach(g=>{const p=g.properties;if(!a[p.co])a[p.co]={dV:0,tot:0};if(p.t>0){a[p.co].dV+=p.t*p.d/100;a[p.co].tot+=p.t}});
  Object.entries(e).forEach(([n,d])=>{const k=n.toLowerCase().replace(/ county| city/g,'').trim();for(const[co,v]of Object.entries(a)){if(co.toLowerCase().replace(/ county| city/g,'').trim()===k){v.ev=d.ev;v.ep=d.ep;break}}});
  Object.values(a).forEach(v=>{v.dp=v.tot>0?v.dV/v.tot*100:0;v.rp=v.tot>0?100-v.dp:0;v.dm=v.dp-v.rp;v.evp=v.tot>0&&v.ev?v.ev/v.tot*100:0});
  return a;
}

function run({t,e,l}){
  LL=bLL(t,e);
  const tEV=Object.values(e).reduce((s,v)=>s+v.ev,0),E=Object.entries(LL),t25=E.reduce((s,[,v])=>s+v.tot,0);
  let eD=0,eG=0;E.forEach(([,d])=>{if(d.ev&&d.tot>0){eD+=d.ev*d.dp/100;eG+=d.ev*d.rp/100}});
  const eP=eD+eG,eM=((eD-eG)/eP*100).toFixed(1),dV=E.reduce((s,[,d])=>s+d.dV,0),bM=((dV-(t25-dV))/t25*100).toFixed(1);
  const e25=l.filter(d=>d.election_id===73).sort((a,b)=>b.days-a.days),e26=l.filter(d=>d.election_id===74).sort((a,b)=>b.days-a.days);
  const ld=e26[e26.length-1].days,l26=e26[e26.length-1].total,m25=e25.find(d=>d.days===ld),f25=e25[e25.length-1].total;
  const pF=Math.round(l26/(m25.total/f25));

  document.getElementById('pills').innerHTML=
    '<div class="pill"><small>EV</small><b>'+tEV.toLocaleString()+'</b></div>'+
    '<div class="pill"><small>Proj</small><b style="color:var(--p)">'+(pF/1e6).toFixed(2)+'M</b></div>'+
    '<div class="pill"><small>Margin</small><b style="color:var(--d)">D+'+eM+'</b></div>'+
    '<div class="pill"><small>Shift</small><b style="color:var(--r)">'+(eM-bM).toFixed(1)+'pp</b></div>';
  document.getElementById('bot').innerHTML=
    '<span>Yes:</span> <b style="color:var(--d)">'+Math.round(eD).toLocaleString()+'</b>'+
    '<span>No:</span> <b style="color:var(--r)">'+Math.round(eG).toLocaleString()+'</b>'+
    '<span>Net:</span> <b>+'+Math.round(eD-eG).toLocaleString()+'</b>'+
    '<span>Final:</span> <b>'+(f25/1e6).toFixed(2)+'→<span style="color:var(--p)">'+(pF/1e6).toFixed(2)+'M</span></b>';

  // Chart
  const cw=document.getElementById('cw'),ratio=l26/m25.total;
  const proj=e25.filter(d=>d.days<ld).map(d=>({days:d.days,total:Math.round(d.total*ratio)}));
  const cr=cw.getBoundingClientRect(),CW=cr.width||250,CH=cr.height||160;
  const P={t:4,r:38,b:12,l:26},w=CW-P.l-P.r,h=CH-P.t-P.b;
  const svg=d3.select(cw).append('svg').attr('viewBox','0 0 '+CW+' '+CH).style('width','100%').style('height','100%');
  const g=svg.append('g').attr('transform','translate('+P.l+','+P.t+')');
  const xS=d3.scaleLinear().domain([46,-3]).range([0,w]),yM=Math.max(d3.max(e25,d=>d.total),d3.max(proj,d=>d.total))*1.05,yS=d3.scaleLinear().domain([0,yM]).range([h,0]);
  g.append('g').call(d3.axisLeft(yS).ticks(3).tickSize(-w).tickFormat('')).selectAll('line').attr('stroke','#eee').attr('stroke-dasharray','2,2');g.selectAll('.domain').remove();
  g.append('g').attr('transform','translate(0,'+h+')').call(d3.axisBottom(xS).tickValues([45,30,15,0]).tickFormat(d=>d===0?'ED':d)).selectAll('text').style('font','600 5px var(--m)').style('fill','#bbb');
  g.append('g').call(d3.axisLeft(yS).ticks(3).tickFormat(d=>d>=1e6?(d/1e6).toFixed(1)+'M':(d/1e3).toFixed(0)+'K')).selectAll('text').style('font','600 5px var(--m)').style('fill','#bbb');
  const ln=d3.line().x(d=>xS(d.days)).y(d=>yS(d.total)).curve(d3.curveMonotoneX);
  g.append('path').datum(e25).attr('d',ln).attr('fill','none').attr('stroke','#bbb').attr('stroke-width',.8).attr('stroke-dasharray','3,2');
  g.append('path').datum([{days:ld,total:l26},...proj]).attr('d',ln).attr('fill','none').attr('stroke','var(--p)').attr('stroke-width',.8).attr('stroke-dasharray','3,2').attr('opacity',.4);
  g.append('path').datum(e26).attr('d',ln).attr('fill','none').attr('stroke','var(--d)').attr('stroke-width',1.2);
  g.append('circle').attr('cx',xS(ld)).attr('cy',yS(l26)).attr('r',1.5).attr('fill','var(--d)');
  g.append('text').attr('x',xS(ld)+2).attr('y',yS(l26)-2).style('font','700 5px var(--m)').style('fill','var(--dd)').text((l26/1e3).toFixed(0)+'K');
  const pe=proj[proj.length-1];if(pe)g.append('text').attr('x',xS(pe.days)+2).attr('y',yS(pe.total)-2).style('font','700 5px var(--m)').style('fill','var(--p)').text((pe.total/1e6).toFixed(2)+'M');
  g.append('text').attr('x',xS(e25[e25.length-1].days)+2).attr('y',yS(e25[e25.length-1].total)+2).style('font','700 5px var(--m)').style('fill','#bbb').text((e25[e25.length-1].total/1e6).toFixed(2)+'M');

  requestAnimationFrame(()=>setTimeout(()=>drawMap(t),100));
}

function drawMap(t){
  // Convert and FIX WINDING
  const ft=rewind(topojson.feature(t,t.objects.precincts));
  const mw=document.getElementById('mw'),r=mw.getBoundingClientRect(),W=r.width,H=r.height;
  if(W<50||H<50){console.error('Container:',W,H);return}
  const svg=d3.select('#ms').attr('viewBox','0 0 '+W+' '+H);
  const pr=d3.geoMercator().fitSize([W-2,H-2],ft);
  const pa=d3.geoPath().projection(pr);

  function gc(d){const p=d.properties,lo=LL[p.co];if(cv==='margin')return p.m==null?'#e5e7eb':MC(p.m);if(cv==='ev')return(!lo||!lo.ep)?'#e5e7eb':EC(lo.ep);return(!lo||!lo.evp)?'#e5e7eb':DC(lo.evp)}

  pp=svg.append('g').selectAll('path').data(ft.features).join('path').attr('d',pa).attr('fill',gc)
    .attr('stroke','rgba(0,0,0,0.12)').attr('stroke-width',.3).attr('vector-effect','non-scaling-stroke').style('cursor','pointer');

  const tip=document.getElementById('tip');
  pp.on('mousemove',function(ev,d){const p=d.properties,lo=LL[p.co];
    let h='<b>'+(p.pn||'—')+'</b><em>'+p.co+'</em>';
    if(p.t>0){const ms=p.m>0?'D+'+p.m:p.m<0?'R+'+Math.abs(p.m):'Even';
      h+='<div class="sec">2025 Gov</div><div class="r"><span class="l">D</span><span class="v dem">'+p.d+'%</span></div><div class="r"><span class="l">R</span><span class="v gop">'+(100-p.d).toFixed(1)+'%</span></div><div class="r"><span class="l">Margin</span><span class="v '+(p.m>0?'dem':'gop')+'">'+ms+'</span></div>'}
    if(lo&&lo.ev){h+='<div class="sec">2026 EV</div><div class="r"><span class="l">Votes</span><span class="v">'+lo.ev.toLocaleString()+'</span></div><div class="r"><span class="l">%Reg</span><span class="v">'+lo.ep.toFixed(1)+'%</span></div><div class="r"><span class="l">%2025</span><span class="v">'+lo.evp.toFixed(1)+'%</span></div>'}
    tip.innerHTML=h;tip.style.display='block';tip.style.left=(ev.clientX+8)+'px';tip.style.top=(ev.clientY-4)+'px';
    d3.select(this).attr('stroke','#000').attr('stroke-width',.8).raise()
  }).on('mouseleave',function(){tip.style.display='none';d3.select(this).attr('stroke','rgba(0,0,0,0.12)').attr('stroke-width',.3)});
  drawLeg();
}

function drawLeg(){const c=document.getElementById('legC').getContext('2d');for(let i=0;i<60;i++){const t=i/60;c.fillStyle=cv==='margin'?MC(-60+t*120):cv==='ev'?EC(3+t*17):DC(8+t*24);c.fillRect(i,0,1,4)}
  const L={margin:['2025 Margin','D+60','0','R+60'],ev:['EV %Reg','3%','12%','20%'],diff:['EV/2025','8%','16%','32%']};const l=L[cv];
  document.getElementById('legT').textContent=l[0];document.getElementById('lL').textContent=l[1];document.getElementById('lM').textContent=l[2];document.getElementById('lR').textContent=l[3];
  document.getElementById('lL').className=cv==='margin'?'d':'';document.getElementById('lR').className=cv==='margin'?'r':''}

document.querySelectorAll('.tog button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tog button').forEach(x=>x.classList.remove('on'));b.classList.add('on');cv=b.dataset.v;
  if(pp)pp.transition().duration(200).attr('fill',function(d){const p=d.properties,lo=LL[p.co];if(cv==='margin')return p.m==null?'#e5e7eb':MC(p.m);if(cv==='ev')return(!lo||!lo.ep)?'#e5e7eb':EC(lo.ep);return(!lo||!lo.evp)?'#e5e7eb':DC(lo.evp)});
  drawLeg()}));

load().then(run).catch(e=>{document.getElementById('tip').textContent=e.message;document.getElementById('tip').style.display='block';document.getElementById('tip').style.top='10px';document.getElementById('tip').style.left='10px'});
</script>
</body>
</html>
