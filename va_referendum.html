<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VA Referendum</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f3f4f6;--card:rgba(255,255,255,0.9);--text:#111827;--dim:#374151;--muted:#6b7280;--line:#e5e7eb;--dem:#2563eb;--dem-dark:#1e40af;--gop:#dc2626;--gop-dark:#991b1b;--toss:#fde047;--proj:#8b5cf6;--r:10px;--f:'Inter',system-ui,sans-serif;--m:ui-monospace,SFMono-Regular,Menlo,monospace;--sh:0 1px 3px rgba(0,0,0,0.04)}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:11px}
.w{height:100vh;padding:6px 10px;display:grid;grid-template-rows:auto auto 1fr auto;gap:5px;max-width:1500px;margin:0 auto}
.hdr{text-align:center;line-height:1.2}
.hdr h1{font-weight:800;font-size:14px;letter-spacing:-.02em}
.hdr p{font-size:9px;color:var(--muted)}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.s{background:var(--card);border-radius:var(--r);padding:5px 8px;box-shadow:var(--sh)}
.s .a{font-weight:700;font-size:7px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.s .b{font-weight:800;font-size:15px;letter-spacing:-.03em;font-variant-numeric:tabular-nums;font-family:var(--m)}
.s .c{font-size:7px;color:var(--muted)}
.mg{display:grid;grid-template-columns:1fr 1.8fr;gap:5px;min-height:0;overflow:hidden}
.cd{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden}
.ch{padding:4px 8px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.ct{font-weight:700;font-size:10px}
.tw{display:inline-flex;background:#eee;border-radius:99px;padding:1px}
.tb{border:none;background:none;padding:2px 7px;font-family:var(--f);font-weight:600;font-size:8px;color:var(--muted);border-radius:99px;cursor:pointer}
.tb.on{background:#fff;color:var(--dem-dark);box-shadow:0 1px 2px rgba(0,0,0,0.08)}
#cw{flex:1;padding:4px 6px;min-height:0;position:relative}
.cl{display:flex;gap:8px;justify-content:center;padding:2px 0;flex-shrink:0}
.cli{display:flex;align-items:center;gap:2px;font-size:7px;font-weight:600;color:var(--dim)}
.cls{width:10px;height:2px;border-radius:1px}
#mw{flex:1;position:relative;min-height:0;overflow:hidden}
#mapSvg{position:absolute;inset:0;width:100%;height:100%}
.lw{position:absolute;bottom:4px;left:4px;background:rgba(255,255,255,0.9);border-radius:6px;padding:4px 6px;box-shadow:var(--sh);font-size:7px}
.lt{font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:2px}
.lb{width:100px;height:6px;border-radius:3px;margin-bottom:1px}
.ll{display:flex;justify-content:space-between;font-weight:600;font-family:var(--m);font-size:6px;color:var(--muted)}
.ll .d{color:var(--dem-dark)}.ll .r{color:var(--gop-dark)}
.tip{position:fixed;pointer-events:none;background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);border-radius:8px;padding:8px 10px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:999;min-width:170px;display:none;font-size:9px;line-height:1.35}
.tip .tt{font-weight:700;font-size:10px}
.tip .ts{font-weight:600;font-size:7px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:4px}
.tr{display:flex;justify-content:space-between;padding:1px 0}
.tl{font-weight:600;color:var(--dim)}
.tv{font-weight:700;font-family:var(--m);font-variant-numeric:tabular-nums}
.tv.dem{color:var(--dem)}.tv.gop{color:var(--gop)}
.tsx{font-weight:700;font-size:7px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:3px 0 1px}
.bt{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:5px 10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:9px}
.bi .bl{font-weight:500;color:var(--dim);font-size:8px}
.bi .bv{font-weight:800;font-family:var(--m);font-variant-numeric:tabular-nums;font-size:10px}
.err{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);background:#fee2e2;color:#991b1b;padding:6px 12px;border-radius:6px;font-size:10px;font-weight:600;display:none;z-index:200}
</style>
</head>
<body>
<div class="w">
  <div class="hdr"><h1>Virginia 2026 Redistricting Referendum</h1><p>Early Vote Projection · 2025 Governor Results Applied</p></div>
  <div class="sr" id="stats"></div>
  <div class="mg">
    <div class="cd">
      <div class="ch"><div class="ct">EV Timeline</div></div>
      <div class="cl"><div class="cli"><div class="cls" style="background:#9ca3af"></div>2025</div><div class="cli"><div class="cls" style="background:var(--dem)"></div>2026</div><div class="cli"><div class="cls" style="background:var(--proj);opacity:.5"></div>Proj</div></div>
      <div id="cw"></div>
    </div>
    <div class="cd">
      <div class="ch">
        <div class="ct">Precinct Map</div>
        <div class="tw"><button class="tb on" data-v="margin">2025 Margin</button><button class="tb" data-v="ev">EV Rate</button><button class="tb" data-v="diff">EV vs 2025</button></div>
      </div>
      <div id="mw"><svg id="mapSvg"></svg>
        <div class="lw" id="leg"><div class="lt" id="legT">2025 Governor Margin</div><canvas class="lb" id="legC" width="100" height="6"></canvas><div class="ll"><span class="d" id="lL">D+60</span><span id="lM">Even</span><span class="r" id="lR">R+60</span></div></div>
      </div>
    </div>
  </div>
  <div class="bt" id="bot"></div>
</div>
<div class="tip" id="tip"></div>
<div class="err" id="err"></div>
<script>
const B='.';
const mC=d3.scaleLinear().domain([-60,-20,-5,0,5,20,60]).range(['#991b1b','#dc2626','#f87171','#fde047','#60a5fa','#2563eb','#1e40af']).clamp(true);
const eC=d3.scaleSequential(d3.interpolateYlOrRd).domain([3,20]);
const dC=d3.scaleLinear().domain([8,12,16.5,21,32]).range(['#ef4444','#fca5a5','#f5f5f5','#93c5fd','#3b82f6']).clamp(true);
let cv='margin',pp,LL={};

async function load(){
  const[t,e,l]=await Promise.all([
    fetch(B+'/va_precincts_2025.json').then(r=>r.json()),
    fetch(B+'/va_ev_2026_locality.json').then(r=>r.json()),
    fetch(B+'/va_ev_cumulative_timeline.json').then(r=>r.json())
  ]);return{t,e,l};
}

function bLL(t,e){
  const a={};t.objects.precincts.geometries.forEach(g=>{const p=g.properties;if(!a[p.co])a[p.co]={dV:0,tot:0};if(p.t>0){a[p.co].dV+=p.t*p.d/100;a[p.co].tot+=p.t}});
  Object.entries(e).forEach(([n,d])=>{const k=n.toLowerCase().replace(/ county| city/g,'').trim();for(const[co,v]of Object.entries(a)){if(co.toLowerCase().replace(/ county| city/g,'').trim()===k){v.ev=d.ev;v.ep=d.ep;break}}});
  Object.values(a).forEach(v=>{v.dp=v.tot>0?v.dV/v.tot*100:0;v.rp=v.tot>0?100-v.dp:0;v.dm=v.dp-v.rp;v.evp=v.tot>0&&v.ev?v.ev/v.tot*100:0});
  return a;
}

function go({t,e,l}){
  LL=bLL(t,e);
  const tEV=Object.values(e).reduce((s,v)=>s+v.ev,0);
  const E=Object.entries(LL),t25=E.reduce((s,[,v])=>s+v.tot,0);
  let eD=0,eG=0;E.forEach(([,d])=>{if(d.ev&&d.tot>0){eD+=d.ev*d.dp/100;eG+=d.ev*d.rp/100}});
  const eP=eD+eG,eM=((eD-eG)/eP*100).toFixed(1),dV=E.reduce((s,[,d])=>s+d.dV,0),bM=((dV-(t25-dV))/t25*100).toFixed(1);
  const e25=l.filter(d=>d.election_id===73).sort((a,b)=>b.days-a.days),e26=l.filter(d=>d.election_id===74).sort((a,b)=>b.days-a.days);
  const ld=e26[e26.length-1].days,l26=e26[e26.length-1].total,m25=e25.find(d=>d.days===ld),f25=e25[e25.length-1].total;
  const pF=Math.round(l26/(m25.total/f25)),pace=(l26/m25.total).toFixed(2);

  document.getElementById('stats').innerHTML=
    '<div class="s"><div class="a">2026 Early Votes</div><div class="b">'+tEV.toLocaleString()+'</div><div class="c">'+(tEV/t25*100).toFixed(1)+'% of 2025</div></div>'+
    '<div class="s"><div class="a">Projected Final</div><div class="b" style="color:var(--proj)">'+(pF/1e6).toFixed(2)+'M</div><div class="c">'+pace+'× 2025 pace</div></div>'+
    '<div class="s"><div class="a">EV Pool Margin</div><div class="b" style="color:var(--dem)">D+'+eM+'</div><div class="c">2025 gov applied</div></div>'+
    '<div class="s"><div class="a">Shift</div><div class="b" style="color:var(--gop)">'+(eM-bM).toFixed(1)+'pp</div><div class="c">vs D+'+bM+' baseline</div></div>';
  document.getElementById('bot').innerHTML=
    '<div class="bi"><div class="bl">Implied Yes</div><div class="bv" style="color:var(--dem)">'+Math.round(eD).toLocaleString()+' ('+(eD/eP*100).toFixed(1)+'%)</div></div>'+
    '<div class="bi"><div class="bl">Implied No</div><div class="bv" style="color:var(--gop)">'+Math.round(eG).toLocaleString()+' ('+(eG/eP*100).toFixed(1)+'%)</div></div>'+
    '<div class="bi"><div class="bl">Net Margin</div><div class="bv">+'+Math.round(eD-eG).toLocaleString()+'</div></div>'+
    '<div class="bi"><div class="bl">2025→2026 Proj</div><div class="bv">'+(f25/1e6).toFixed(2)+'M → <span style="color:var(--proj)">'+(pF/1e6).toFixed(2)+'M</span></div></div>';

  // Chart
  const cw=document.getElementById('cw'),ratio=l26/m25.total;
  const proj=e25.filter(d=>d.days<ld).map(d=>({days:d.days,total:Math.round(d.total*ratio)}));
  const cr=cw.getBoundingClientRect(),CW=cr.width||300,CH=cr.height||200;
  const P={t:8,r:55,b:18,l:36},w=CW-P.l-P.r,h=CH-P.t-P.b;
  const svg=d3.select(cw).append('svg').attr('viewBox','0 0 '+CW+' '+CH).style('width','100%').style('height','100%');
  const g=svg.append('g').attr('transform','translate('+P.l+','+P.t+')');
  const xS=d3.scaleLinear().domain([46,-3]).range([0,w]),yM=Math.max(d3.max(e25,d=>d.total),d3.max(proj,d=>d.total))*1.05,yS=d3.scaleLinear().domain([0,yM]).range([h,0]);
  g.append('g').call(d3.axisLeft(yS).ticks(4).tickSize(-w).tickFormat('')).selectAll('line').attr('stroke','#e5e7eb').attr('stroke-dasharray','2,2');g.selectAll('.domain').remove();
  g.append('g').attr('transform','translate(0,'+h+')').call(d3.axisBottom(xS).tickValues([45,35,25,15,5,0]).tickFormat(d=>d===0?'ED':d)).selectAll('text').style('font','600 7px var(--m)').style('fill','#9ca3af');
  g.append('g').call(d3.axisLeft(yS).ticks(4).tickFormat(d=>d>=1e6?(d/1e6).toFixed(1)+'M':(d/1e3).toFixed(0)+'K')).selectAll('text').style('font','600 7px var(--m)').style('fill','#9ca3af');
  const ln=d3.line().x(d=>xS(d.days)).y(d=>yS(d.total)).curve(d3.curveMonotoneX);
  g.append('path').datum(e25).attr('d',ln).attr('fill','none').attr('stroke','#9ca3af').attr('stroke-width',1.2).attr('stroke-dasharray','3,2');
  g.append('path').datum([{days:ld,total:l26},...proj]).attr('d',ln).attr('fill','none').attr('stroke','var(--proj)').attr('stroke-width',1.2).attr('stroke-dasharray','3,2').attr('opacity',.5);
  g.append('path').datum(e26).attr('d',ln).attr('fill','none').attr('stroke','var(--dem)').attr('stroke-width',1.8);
  g.append('circle').attr('cx',xS(ld)).attr('cy',yS(l26)).attr('r',2.5).attr('fill','var(--dem)');
  g.append('text').attr('x',xS(ld)+4).attr('y',yS(l26)-3).style('font','700 7px var(--m)').style('fill','var(--dem-dark)').text((l26/1e3).toFixed(0)+'K');
  const pe=proj[proj.length-1];if(pe)g.append('text').attr('x',xS(pe.days)+3).attr('y',yS(pe.total)-3).style('font','700 7px var(--m)').style('fill','var(--proj)').text((pe.total/1e6).toFixed(2)+'M');
  g.append('text').attr('x',xS(e25[e25.length-1].days)+3).attr('y',yS(e25[e25.length-1].total)+3).style('font','700 7px var(--m)').style('fill','#9ca3af').text((e25[e25.length-1].total/1e6).toFixed(2)+'M');

  // Map — use setTimeout to ensure container has rendered
  setTimeout(()=>renderMap(t),50);
}

function renderMap(t){
  const features=topojson.feature(t,t.objects.precincts);
  const mw=document.getElementById('mw');
  const r=mw.getBoundingClientRect();
  const W=r.width,H=r.height;
  if(W<10||H<10){console.error('Map container too small:',W,H);return}
  const svg=d3.select('#mapSvg').attr('viewBox','0 0 '+W+' '+H);
  const projection=d3.geoMercator().fitSize([W-4,H-4],features);
  const path=d3.geoPath().projection(projection);

  function gc(d){const p=d.properties,lo=LL[p.co];
    if(cv==='margin')return p.m==null?'#e5e7eb':mC(p.m);
    if(cv==='ev')return(!lo||!lo.ep)?'#e5e7eb':eC(lo.ep);
    return(!lo||!lo.evp)?'#e5e7eb':dC(lo.evp)}

  // State outline first (merged precincts)
  const merged=topojson.merge(t,t.objects.precincts.geometries);
  svg.append('path').datum(merged).attr('d',path).attr('fill','none').attr('stroke','#374151').attr('stroke-width',1);

  pp=svg.append('g').selectAll('path').data(features.features).join('path')
    .attr('d',path).attr('fill',gc)
    .attr('stroke','rgba(0,0,0,0.15)').attr('stroke-width',0.4)
    .attr('vector-effect','non-scaling-stroke').style('cursor','pointer');

  // Re-draw state outline on top
  svg.append('path').datum(merged).attr('d',path).attr('fill','none').attr('stroke','#374151').attr('stroke-width',0.8);

  const tip=document.getElementById('tip');
  pp.on('mousemove',function(ev,d){
    const p=d.properties,lo=LL[p.co];
    let h='<div class="tt">'+(p.pn||'—')+'</div><div class="ts">'+p.co+'</div>';
    if(p.t>0){const ms=p.m>0?'D+'+p.m:p.m<0?'R+'+Math.abs(p.m):'Even';
      h+='<div class="tsx">2025 Governor</div><div class="tr"><span class="tl">Spanberger</span><span class="tv dem">'+p.d+'%</span></div><div class="tr"><span class="tl">Earle-Sears</span><span class="tv gop">'+(100-p.d).toFixed(1)+'%</span></div><div class="tr"><span class="tl">Margin</span><span class="tv '+(p.m>0?'dem':'gop')+'">'+ms+'</span></div><div class="tr"><span class="tl">Total</span><span class="tv">'+p.t.toLocaleString()+'</span></div>'}
    if(lo&&lo.ev){h+='<div class="tsx">2026 EV (locality)</div><div class="tr"><span class="tl">Early votes</span><span class="tv">'+lo.ev.toLocaleString()+'</span></div><div class="tr"><span class="tl">% registered</span><span class="tv">'+lo.ep.toFixed(1)+'%</span></div><div class="tr"><span class="tl">% of 2025</span><span class="tv">'+lo.evp.toFixed(1)+'%</span></div>'}
    tip.innerHTML=h;tip.style.display='block';tip.style.left=(ev.clientX+12)+'px';tip.style.top=(ev.clientY-8)+'px';
    d3.select(this).attr('stroke','#000').attr('stroke-width',1).raise()
  }).on('mouseleave',function(){tip.style.display='none';d3.select(this).attr('stroke','rgba(0,0,0,0.15)').attr('stroke-width',0.4)});
  drawLeg();
}

function drawLeg(){const c=document.getElementById('legC').getContext('2d');
  for(let i=0;i<100;i++){const t=i/100;c.fillStyle=cv==='margin'?mC(-60+t*120):cv==='ev'?eC(3+t*17):dC(8+t*24);c.fillRect(i,0,1,6)}
  const L={margin:['2025 Governor Margin','D+60','Even','R+60'],ev:['EV Rate (% Reg)','3%','12%','20%'],diff:['EV / 2025 Turnout','8%','16%','32%']};
  const l=L[cv];document.getElementById('legT').textContent=l[0];document.getElementById('lL').textContent=l[1];document.getElementById('lM').textContent=l[2];document.getElementById('lR').textContent=l[3];
  document.getElementById('lL').className=cv==='margin'?'d':'';document.getElementById('lR').className=cv==='margin'?'r':''}

document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));b.classList.add('on');cv=b.dataset.v;
  if(pp)pp.transition().duration(250).attr('fill',function(d){const p=d.properties,lo=LL[p.co];
    if(cv==='margin')return p.m==null?'#e5e7eb':mC(p.m);if(cv==='ev')return(!lo||!lo.ep)?'#e5e7eb':eC(lo.ep);return(!lo||!lo.evp)?'#e5e7eb':dC(lo.evp)});
  drawLeg()}));

load().then(go).catch(e=>{document.getElementById('err').textContent=e.message;document.getElementById('err').style.display='block';console.error(e)});
</script>
</body>
</html>
