<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VA Referendum</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:#f3f4f6;color:#111827;-webkit-font-smoothing:antialiased;font-size:10px}
:root{--dem:#2563eb;--dem-d:#1e40af;--gop:#dc2626;--gop-d:#991b1b;--proj:#8b5cf6;--m:ui-monospace,SFMono-Regular,Menlo,monospace}
.w{height:100vh;display:grid;grid-template-rows:auto auto 1fr auto;padding:4px 8px;gap:4px;max-width:1500px;margin:0 auto}
.hdr{text-align:center;padding:2px 0}
.hdr h1{font-weight:800;font-size:13px;letter-spacing:-.01em;display:inline}
.hdr span{font-size:9px;color:#6b7280;margin-left:6px}
/* Stats: compact inline row */
.sr{display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.s{background:rgba(255,255,255,0.85);border-radius:6px;padding:3px 8px;display:flex;align-items:baseline;gap:4px;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.s .a{font-weight:600;font-size:8px;text-transform:uppercase;letter-spacing:.04em;color:#6b7280}
.s .b{font-weight:800;font-size:12px;font-family:var(--m);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.s .c{font-size:7px;color:#9ca3af}
/* Main grid */
.mg{display:grid;grid-template-columns:1fr 2fr;gap:4px;min-height:0;overflow:hidden}
.cd{background:rgba(255,255,255,0.85);border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,0.04);display:flex;flex-direction:column;overflow:hidden}
.ch{padding:3px 8px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.ct{font-weight:700;font-size:9px}
.tw{display:inline-flex;background:#eee;border-radius:99px;padding:1px}
.tb{border:none;background:none;padding:2px 6px;font-family:inherit;font-weight:600;font-size:7px;color:#9ca3af;border-radius:99px;cursor:pointer}
.tb.on{background:#fff;color:var(--dem-d);box-shadow:0 1px 2px rgba(0,0,0,0.08)}
#cw{flex:1;padding:3px 5px;min-height:0}
.cl{display:flex;gap:6px;justify-content:center;padding:2px 0;flex-shrink:0}
.cli{display:flex;align-items:center;gap:2px;font-size:7px;font-weight:600;color:#6b7280}
.cls{width:8px;height:2px;border-radius:1px}
#mw{flex:1;position:relative;min-height:0;overflow:hidden}
#mapSvg{position:absolute;inset:0;width:100%;height:100%}
.lw{position:absolute;bottom:3px;left:3px;background:rgba(255,255,255,0.9);border-radius:5px;padding:3px 5px}
.lt{font-weight:700;font-size:6px;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;margin-bottom:1px}
.lb{width:80px;height:5px;border-radius:3px}
.ll{display:flex;justify-content:space-between;font-weight:600;font-size:5px;font-family:var(--m);color:#9ca3af;width:80px}
.ll .d{color:var(--dem-d)}.ll .r{color:var(--gop-d)}
.tip{position:fixed;pointer-events:none;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-radius:7px;padding:6px 8px;box-shadow:0 3px 12px rgba(0,0,0,0.12);z-index:999;min-width:150px;display:none;font-size:8px;line-height:1.3}
.tip .tt{font-weight:700;font-size:9px}
.tip .ts{font-weight:600;font-size:6px;text-transform:uppercase;letter-spacing:.04em;color:#9ca3af;margin-bottom:3px}
.tr{display:flex;justify-content:space-between;padding:1px 0}
.tl{font-weight:600;color:#374151}
.tv{font-weight:700;font-family:var(--m);font-variant-numeric:tabular-nums}
.tv.dem{color:var(--dem)}.tv.gop{color:var(--gop)}
.tsx{font-weight:700;font-size:6px;text-transform:uppercase;letter-spacing:.04em;color:#9ca3af;margin:3px 0 1px}
/* Bottom bar */
.bt{display:flex;gap:10px;justify-content:center;background:rgba(255,255,255,0.85);border-radius:6px;padding:3px 12px;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.bi{display:flex;align-items:baseline;gap:3px;font-size:8px}
.bi .bl{color:#6b7280}
.bi .bv{font-weight:800;font-family:var(--m);font-variant-numeric:tabular-nums}
.err{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);background:#fee2e2;color:#991b1b;padding:4px 10px;border-radius:5px;font-size:9px;font-weight:600;display:none;z-index:200}
</style>
</head>
<body>
<div class="w">
  <div class="hdr"><h1>Virginia 2026 Redistricting Referendum</h1><span>Early Vote · 2025 Gov Applied</span></div>
  <div class="sr" id="stats"></div>
  <div class="mg">
    <div class="cd">
      <div class="ch"><div class="ct">EV Timeline</div></div>
      <div class="cl"><div class="cli"><div class="cls" style="background:#9ca3af"></div>2025</div><div class="cli"><div class="cls" style="background:var(--dem)"></div>2026</div><div class="cli"><div class="cls" style="background:var(--proj);opacity:.5"></div>Proj</div></div>
      <div id="cw"></div>
    </div>
    <div class="cd">
      <div class="ch">
        <div class="ct">Precinct Map</div>
        <div class="tw"><button class="tb on" data-v="margin">2025</button><button class="tb" data-v="ev">EV Rate</button><button class="tb" data-v="diff">EV/2025</button></div>
      </div>
      <div id="mw"><svg id="mapSvg"></svg>
        <div class="lw" id="leg"><div class="lt" id="legT">2025 Gov Margin</div><canvas class="lb" id="legC" width="80" height="5"></canvas><div class="ll"><span class="d" id="lL">D+60</span><span id="lM">Even</span><span class="r" id="lR">R+60</span></div></div>
      </div>
    </div>
  </div>
  <div class="bt" id="bot"></div>
</div>
<div class="tip" id="tip"></div>
<div class="err" id="err"></div>
<script>
const B='.';
const mC=d3.scaleLinear().domain([-60,-20,-5,0,5,20,60]).range(['#991b1b','#dc2626','#f87171','#fde047','#60a5fa','#2563eb','#1e40af']).clamp(true);
const eC=d3.scaleSequential(d3.interpolateYlOrRd).domain([3,20]);
const dC=d3.scaleLinear().domain([8,12,16.5,21,32]).range(['#ef4444','#fca5a5','#f5f5f5','#93c5fd','#3b82f6']).clamp(true);
let cv='margin',pp,LL={};

async function load(){
  const[t,e,l]=await Promise.all([
    fetch(B+'/va_precincts_2025.json').then(r=>r.json()),
    fetch(B+'/va_ev_2026_locality.json').then(r=>r.json()),
    fetch(B+'/va_ev_cumulative_timeline.json').then(r=>r.json())
  ]);return{t,e,l};
}
function bLL(t,e){
  const a={};t.objects.precincts.geometries.forEach(g=>{const p=g.properties;if(!a[p.co])a[p.co]={dV:0,tot:0};if(p.t>0){a[p.co].dV+=p.t*p.d/100;a[p.co].tot+=p.t}});
  Object.entries(e).forEach(([n,d])=>{const k=n.toLowerCase().replace(/ county| city/g,'').trim();for(const[co,v]of Object.entries(a)){if(co.toLowerCase().replace(/ county| city/g,'').trim()===k){v.ev=d.ev;v.ep=d.ep;break}}});
  Object.values(a).forEach(v=>{v.dp=v.tot>0?v.dV/v.tot*100:0;v.rp=v.tot>0?100-v.dp:0;v.dm=v.dp-v.rp;v.evp=v.tot>0&&v.ev?v.ev/v.tot*100:0});
  return a;
}
function go({t,e,l}){
  LL=bLL(t,e);
  const tEV=Object.values(e).reduce((s,v)=>s+v.ev,0),E=Object.entries(LL),t25=E.reduce((s,[,v])=>s+v.tot,0);
  let eD=0,eG=0;E.forEach(([,d])=>{if(d.ev&&d.tot>0){eD+=d.ev*d.dp/100;eG+=d.ev*d.rp/100}});
  const eP=eD+eG,eM=((eD-eG)/eP*100).toFixed(1),dV=E.reduce((s,[,d])=>s+d.dV,0),bM=((dV-(t25-dV))/t25*100).toFixed(1);
  const e25=l.filter(d=>d.election_id===73).sort((a,b)=>b.days-a.days),e26=l.filter(d=>d.election_id===74).sort((a,b)=>b.days-a.days);
  const ld=e26[e26.length-1].days,l26=e26[e26.length-1].total,m25=e25.find(d=>d.days===ld),f25=e25[e25.length-1].total;
  const pF=Math.round(l26/(m25.total/f25)),pace=(l26/m25.total).toFixed(2);

  document.getElementById('stats').innerHTML=
    '<div class="s"><div class="a">Early Votes</div><div class="b">'+tEV.toLocaleString()+'</div><div class="c">'+(tEV/t25*100).toFixed(1)+'%</div></div>'+
    '<div class="s"><div class="a">Proj Final</div><div class="b" style="color:var(--proj)">'+(pF/1e6).toFixed(2)+'M</div><div class="c">'+pace+'×</div></div>'+
    '<div class="s"><div class="a">EV Margin</div><div class="b" style="color:var(--dem)">D+'+eM+'</div></div>'+
    '<div class="s"><div class="a">Shift</div><div class="b" style="color:var(--gop)">'+(eM-bM).toFixed(1)+'pp</div></div>';

  document.getElementById('bot').innerHTML=
    '<div class="bi"><div class="bl">Yes:</div><div class="bv" style="color:var(--dem)">'+Math.round(eD).toLocaleString()+' ('+(eD/eP*100).toFixed(1)+'%)</div></div>'+
    '<div class="bi"><div class="bl">No:</div><div class="bv" style="color:var(--gop)">'+Math.round(eG).toLocaleString()+' ('+(eG/eP*100).toFixed(1)+'%)</div></div>'+
    '<div class="bi"><div class="bl">Net:</div><div class="bv">+'+Math.round(eD-eG).toLocaleString()+'</div></div>'+
    '<div class="bi"><div class="bl">Final:</div><div class="bv">'+(f25/1e6).toFixed(2)+'M→<span style="color:var(--proj)">'+(pF/1e6).toFixed(2)+'M</span></div></div>';

  // Chart
  const cw=document.getElementById('cw'),ratio=l26/m25.total;
  const proj=e25.filter(d=>d.days<ld).map(d=>({days:d.days,total:Math.round(d.total*ratio)}));
  const cr=cw.getBoundingClientRect(),CW=cr.width||280,CH=cr.height||180;
  const P={t:6,r:46,b:14,l:30},w=CW-P.l-P.r,h=CH-P.t-P.b;
  const svg=d3.select(cw).append('svg').attr('viewBox','0 0 '+CW+' '+CH).style('width','100%').style('height','100%');
  const g=svg.append('g').attr('transform','translate('+P.l+','+P.t+')');
  const xS=d3.scaleLinear().domain([46,-3]).range([0,w]),yM=Math.max(d3.max(e25,d=>d.total),d3.max(proj,d=>d.total))*1.05,yS=d3.scaleLinear().domain([0,yM]).range([h,0]);
  g.append('g').call(d3.axisLeft(yS).ticks(3).tickSize(-w).tickFormat('')).selectAll('line').attr('stroke','#e5e7eb').attr('stroke-dasharray','2,2');g.selectAll('.domain').remove();
  g.append('g').attr('transform','translate(0,'+h+')').call(d3.axisBottom(xS).tickValues([45,30,15,0]).tickFormat(d=>d===0?'ED':d)).selectAll('text').style('font','600 6px var(--m)').style('fill','#9ca3af');
  g.append('g').call(d3.axisLeft(yS).ticks(3).tickFormat(d=>d>=1e6?(d/1e6).toFixed(1)+'M':(d/1e3).toFixed(0)+'K')).selectAll('text').style('font','600 6px var(--m)').style('fill','#9ca3af');
  const ln=d3.line().x(d=>xS(d.days)).y(d=>yS(d.total)).curve(d3.curveMonotoneX);
  g.append('path').datum(e25).attr('d',ln).attr('fill','none').attr('stroke','#9ca3af').attr('stroke-width',1).attr('stroke-dasharray','3,2');
  g.append('path').datum([{days:ld,total:l26},...proj]).attr('d',ln).attr('fill','none').attr('stroke','var(--proj)').attr('stroke-width',1).attr('stroke-dasharray','3,2').attr('opacity',.4);
  g.append('path').datum(e26).attr('d',ln).attr('fill','none').attr('stroke','var(--dem)').attr('stroke-width',1.5);
  g.append('circle').attr('cx',xS(ld)).attr('cy',yS(l26)).attr('r',2).attr('fill','var(--dem)');
  g.append('text').attr('x',xS(ld)+3).attr('y',yS(l26)-2).style('font','700 6px var(--m)').style('fill','var(--dem-d)').text((l26/1e3).toFixed(0)+'K');
  const pe=proj[proj.length-1];if(pe)g.append('text').attr('x',xS(pe.days)+2).attr('y',yS(pe.total)-2).style('font','700 6px var(--m)').style('fill','var(--proj)').text((pe.total/1e6).toFixed(2)+'M');
  g.append('text').attr('x',xS(e25[e25.length-1].days)+2).attr('y',yS(e25[e25.length-1].total)+2).style('font','700 6px var(--m)').style('fill','#9ca3af').text((e25[e25.length-1].total/1e6).toFixed(2)+'M');

  setTimeout(()=>renderMap(t),60);
}
function renderMap(t){
  const ft=topojson.feature(t,t.objects.precincts);
  const mw=document.getElementById('mw'),r=mw.getBoundingClientRect(),W=r.width,H=r.height;
  if(W<10||H<10)return;
  const svg=d3.select('#mapSvg').attr('viewBox','0 0 '+W+' '+H);
  const pr=d3.geoMercator().fitSize([W-4,H-4],ft);
  const pa=d3.geoPath().projection(pr);
  function gc(d){const p=d.properties,lo=LL[p.co];if(cv==='margin')return p.m==null?'#e5e7eb':mC(p.m);if(cv==='ev')return(!lo||!lo.ep)?'#e5e7eb':eC(lo.ep);return(!lo||!lo.evp)?'#e5e7eb':dC(lo.evp)}
  pp=svg.append('g').selectAll('path').data(ft.features).join('path').attr('d',pa).attr('fill',gc).attr('stroke','rgba(0,0,0,0.12)').attr('stroke-width',0.3).attr('vector-effect','non-scaling-stroke').style('cursor','pointer');
  svg.append('path').datum(topojson.merge(t,t.objects.precincts.geometries)).attr('d',pa).attr('fill','none').attr('stroke','#374151').attr('stroke-width',.6);
  const tip=document.getElementById('tip');
  pp.on('mousemove',function(ev,d){const p=d.properties,lo=LL[p.co];
    let h='<div class="tt">'+(p.pn||'—')+'</div><div class="ts">'+p.co+'</div>';
    if(p.t>0){const ms=p.m>0?'D+'+p.m:p.m<0?'R+'+Math.abs(p.m):'Even';h+='<div class="tsx">2025 Gov</div><div class="tr"><span class="tl">D</span><span class="tv dem">'+p.d+'%</span></div><div class="tr"><span class="tl">R</span><span class="tv gop">'+(100-p.d).toFixed(1)+'%</span></div><div class="tr"><span class="tl">Margin</span><span class="tv '+(p.m>0?'dem':'gop')+'">'+ms+'</span></div><div class="tr"><span class="tl">Total</span><span class="tv">'+p.t.toLocaleString()+'</span></div>'}
    if(lo&&lo.ev){h+='<div class="tsx">2026 EV</div><div class="tr"><span class="tl">Votes</span><span class="tv">'+lo.ev.toLocaleString()+'</span></div><div class="tr"><span class="tl">%Reg</span><span class="tv">'+lo.ep.toFixed(1)+'%</span></div><div class="tr"><span class="tl">%2025</span><span class="tv">'+lo.evp.toFixed(1)+'%</span></div>'}
    tip.innerHTML=h;tip.style.display='block';tip.style.left=(ev.clientX+10)+'px';tip.style.top=(ev.clientY-6)+'px';
    d3.select(this).attr('stroke','#000').attr('stroke-width',.8).raise()
  }).on('mouseleave',function(){tip.style.display='none';d3.select(this).attr('stroke','rgba(0,0,0,0.12)').attr('stroke-width',0.3)});
  drawLeg();
}
function drawLeg(){const c=document.getElementById('legC').getContext('2d');for(let i=0;i<80;i++){const t=i/80;c.fillStyle=cv==='margin'?mC(-60+t*120):cv==='ev'?eC(3+t*17):dC(8+t*24);c.fillRect(i,0,1,5)}
  const L={margin:['2025 Gov Margin','D+60','Even','R+60'],ev:['EV % Reg','3%','12%','20%'],diff:['EV/2025','8%','16%','32%']};const l=L[cv];
  document.getElementById('legT').textContent=l[0];document.getElementById('lL').textContent=l[1];document.getElementById('lM').textContent=l[2];document.getElementById('lR').textContent=l[3];
  document.getElementById('lL').className=cv==='margin'?'d':'';document.getElementById('lR').className=cv==='margin'?'r':''}
document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));b.classList.add('on');cv=b.dataset.v;
  if(pp)pp.transition().duration(250).attr('fill',function(d){const p=d.properties,lo=LL[p.co];if(cv==='margin')return p.m==null?'#e5e7eb':mC(p.m);if(cv==='ev')return(!lo||!lo.ep)?'#e5e7eb':eC(lo.ep);return(!lo||!lo.evp)?'#e5e7eb':dC(lo.evp)});drawLeg()}));
load().then(go).catch(e=>{document.getElementById('err').textContent=e.message;document.getElementById('err').style.display='block'});
</script>
</body>
</html>
